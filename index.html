<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparar números</title>
</head>
<body>
    <h1>Comparar dos números</h1>

    <input type="number" id="numero1" placeholder="Número 1">
    <input type="number" id="numero2" placeholder="Número 2">
    <button onclick="comparar()">Comparar</button>

    <p id="resultado"></p>

    <script>
        function comparar() {
            const numero1 = Number(document.getElementById("numero1").value);
            const numero2 = Number(document.getElementById("numero2").value);

            if (numero1 > numero2) {
                document.getElementById("resultado").textContent = "El número 1 es mayor";
            } else if (numero2 > numero1) {
                document.getElementById("resultado").textContent = "El número 2 es mayor";
            } else {
                document.getElementById("resultado").textContent = "Los números son iguales";
            }
        }
    </script>
</body>
</html>
